# ─── Server ───────────────────────────────────────
server.port=8080

# ─── H2 In-Memory Database ────────────────────────
spring.datasource.url=jdbc:h2:mem:querydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ──────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── CORS ─────────────────────────────────────────
# Allowed origins for frontend (update for production)
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,null

# ─── Allowed Email Domain ─────────────────────────
# Change this to your college domain e.g. @nmiet.edu.in
app.allowed-email-domain=@nmiet.edu.in

# ─── Teacher PIN (simple auth for teacher panel) ──
app.teacher-pin=teacher123

# ─── Mail Configuration (Optional – for email notifications) ──
# Uncomment and configure to enable email notifications
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# app.mail.enabled=false
# app.mail.teacher-name=Dr. Renuka Kajale
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
